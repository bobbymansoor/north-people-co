<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>North People Co — HR advisory &amp; support for Australian businesses</title>
  <meta name="description" content="An Australian HR consultancy walking alongside your business through every people decision — HR advisory, employee relations, capability &amp; culture. Sydney · Melbourne · Brisbane." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Allura&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #14245A;
      --ink-deep: #0B1437;
      --ink-soft: #2A3D7C;
      --cream: #F5EEDD;
      --cream-soft: #FAF6EC;
      --cream-warm: #EEE3CB;
      --tan: #C89B6F;
      --tan-soft: #E5C9A4;
      --rust: #B0552E;
      --muted: #6B6353;
      --hairline: rgba(20, 36, 90, 0.14);
      --hairline-light: rgba(20, 36, 90, 0.08);

      --f-display: "Anton", "Archivo Black", system-ui, sans-serif;
      --f-script: "Allura", cursive;
      --f-body: "DM Sans", system-ui, sans-serif;
      --f-serif: "Fraunces", Georgia, serif;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      scroll-behavior: smooth;
    }
    body { font-family: var(--f-body); }
    *, *::before, *::after { box-sizing: border-box; }

    /* Pre-paint hero so first paint isn't cream-flash before the React tree mounts */
    .np-preboot {
      min-height: 100vh;
      background: var(--ink-deep);
    }
  </style>

  <link rel="stylesheet" href="landing.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="dynamic-sky.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "mood": "boutique",
      "headlineVoice": "display",
      "skyActivity": "calm"
    }/*EDITMODE-END*/;
    window.TWEAK_DEFAULTS = TWEAK_DEFAULTS;

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Landing />);
  </script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0B1437">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0B1437"/>
      <!-- Four-point north star -->
      <g transform="translate(600 400)">
        <path d="M 0 -240
                 C 50 -120, 70 -90, 240 0
                 C 70 90, 50 120, 0 240
                 C -50 120, -70 90, -240 0
                 C -70 -90, -50 -120, 0 -240 Z"
              fill="none" stroke="#E5C9A4" stroke-width="6" stroke-linejoin="round"/>
        <!-- Inner subtle twinkle dots -->
        <circle cx="-320" cy="-200" r="3" fill="#F5EEDD" opacity="0.7"/>
        <circle cx="340" cy="-260" r="2" fill="#F5EEDD" opacity="0.5"/>
        <circle cx="380" cy="220" r="3" fill="#F5EEDD" opacity="0.6"/>
        <circle cx="-360" cy="240" r="2" fill="#F5EEDD" opacity="0.5"/>
        <circle cx="280" cy="-340" r="2" fill="#E5C9A4" opacity="0.8"/>
        <circle cx="-280" cy="320" r="2" fill="#E5C9A4" opacity="0.6"/>
      </g>
      <!-- Wordmark -->
      <text x="600" y="700" text-anchor="middle"
            font-family="'Anton', 'Archivo Black', system-ui, sans-serif"
            font-size="64" letter-spacing="6" fill="#F5EEDD">NORTH</text>
    </svg>
  </template>
  <div id="root"><div class="np-preboot"></div></div>
</body>
</html>
