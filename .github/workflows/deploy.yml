name: Deploy to Cloudflare Pages

# Runs automatically every time you push to the main branch.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Run Wrangler directly (instead of cloudflare/wrangler-action) so its
      # full output/errors print straight into the Actions log.
      # Deploys the whole repo (static files + the functions/ folder).
      # "northpeople" must match your Pages project name exactly.
      - name: Deploy to Cloudflare Pages
        run: npx -y wrangler@4 pages deploy . --project-name=northpeople --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
